services:
  studio:
    build:
      context: .
      target: dev
    init: true
    ports:
      - "${SLIDEOTTER_PORT:-4173}:4173"
    environment:
      HOST: 0.0.0.0
      PORT: 4173
      SLIDEOTTER_HOME: /data
      STUDIO_IDEATE_MODE: ${STUDIO_IDEATE_MODE:-auto}
      STUDIO_LLM_PROVIDER: ${STUDIO_LLM_PROVIDER:-}
      STUDIO_LLM_MODEL: ${STUDIO_LLM_MODEL:-}
      STUDIO_LLM_BASE_URL: ${DOCKER_STUDIO_LLM_BASE_URL:-}
      LMSTUDIO_MODEL: ${LMSTUDIO_MODEL:-}
      LMSTUDIO_BASE_URL: ${DOCKER_LMSTUDIO_BASE_URL:-http://host.docker.internal:1234}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-}
      OPENROUTER_HTTP_REFERER: ${OPENROUTER_HTTP_REFERER:-}
      OPENROUTER_APP_TITLE: ${OPENROUTER_APP_TITLE:-slideotter}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - .:/app
      - slideotter_node_modules:/app/node_modules
      - slideotter_data:/data
    command: npm run studio:start

volumes:
  slideotter_node_modules:
  slideotter_data:
